# Proxy reverso de instância única: um domínio/IP só, roteamento por path.
# /api/*  -> FastAPI (container "api", porta 8000, interna)
# demais  -> Next.js (container "web", porta 3000, interna)
#
# Path-based num único origin também elimina CORS pro navegador: a chamada
# do browser pra /api/... é same-origin (mesmo host/porta da página).

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Depois de apontar um domínio real pro Elastic IP e rodar certbot (ver
# docs/DEPLOY.md secao 5.5), este arquivo passa a ter um segundo server{}
# bloco na porta 443 com ssl_certificate/ssl_certificate_key, e o bloco
# acima vira um redirect 80 -> 443. Não dá pra emitir certificado Let's
# Encrypt válido pra um IP nu, só pra domínio.
